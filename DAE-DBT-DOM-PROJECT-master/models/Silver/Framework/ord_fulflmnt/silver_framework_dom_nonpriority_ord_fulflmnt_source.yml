version: 2

sources:
  - name: nonpriority_ord_fulflmnt_silver
    database: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}"
    schema: "{{ env_var('DBT_SILVER_SCHEMA') | as_text }}"
    ### these meta configs are utilized at the model ( j in the i for j ) ###
    config:
      meta:
        pipeline_name: dom
        src_type: mysql
        src_name: mao
        src_module: mao
        tgt_layer: silver
        mysql_connector_db: "{{ env_var('DBT_DOM_CONNECTOR_DB')| as_text }}.PUBLIC.connector_stats"
        t_minus_interval: "{{ env_var('DBT_T_MINUS_INTERVAL_SILVER')| as_text }}"
        merge_predicate_interval: "{{ env_var('DBT_MERGE_PREDICATE_INTERVAL_SILVER')| as_text }}"
    tables:
      - name: ful_quantity_detail
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_ORD_FULFLMNT_SCHEMA') | as_text }}.ful_quantity_detail"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_ful_quantity_detail_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.ful_quantity_detail_archive_v"
            load_type: incremental
      - name: ful_staging_location
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_ORD_FULFLMNT_SCHEMA') | as_text }}.ful_staging_location"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_ful_staging_location_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.ful_staging_location_archive_v"
            load_type: incremental

  - name: bronze_desc_source
    database: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}"
    schema: "{{ env_var('DBT_MONITOR_SCHEMA') | as_text }}"
    tables:
      - name: DESC_TESTS
        identifier: DESC_TESTS
        config:
          meta:
            description: "Table with column descriptions"
      - name: DESC_ALTER
        identifier: DESC_ALTER
        config:
          meta:
            description: "Table with column descriptions"