version: 2

sources:
  - name: priority_itm_silver
    database: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}"
    schema: "{{ env_var('DBT_SILVER_SCHEMA') | as_text }}"
    config:
      meta:
        pipeline_name: dom
        src_type: mysql
        src_name: mao
        src_module: mao
        tgt_layer: silver
        mysql_connector_db: "{{ env_var('DBT_DOM_CONNECTOR_DB')| as_text }}.PUBLIC.connector_stats"
        t_minus_interval: "{{ env_var('DBT_T_MINUS_INTERVAL_SILVER')| as_text }}"
        merge_predicate_interval: "{{ env_var('DBT_MERGE_PREDICATE_INTERVAL_SILVER')| as_text }}"
    tables:
      - name: itm_item
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_ITM_SCHEMA') | as_text }}.itm_item"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_itm_item_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.itm_item_archive_v"
            load_type: incremental
      - name: itm_selling_attributes
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_ITM_SCHEMA') | as_text }}.itm_selling_attributes"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_itm_selling_attributes_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.itm_selling_attributes_archive_v"
            load_type: incremental