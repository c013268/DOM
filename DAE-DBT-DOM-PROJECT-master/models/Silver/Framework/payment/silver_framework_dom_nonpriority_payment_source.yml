version: 2

sources:
  - name: nonpriority_1_payment_silver
    database: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}"
    schema: "{{ env_var('DBT_SILVER_SCHEMA') | as_text }}"
    config:
      meta:
        pipeline_name: dom
        src_type: mysql
        src_name: mao
        src_module: mao
        tgt_layer: silver
        mysql_connector_db: "{{ env_var('DBT_DOM_CONNECTOR_DB')| as_text }}.PUBLIC.connector_stats"
        t_minus_interval: "{{ env_var('DBT_T_MINUS_INTERVAL_SILVER')| as_text }}"
        merge_predicate_interval: "{{ env_var('DBT_MERGE_PREDICATE_INTERVAL_SILVER')| as_text }}"
    tables:
      - name: pay_parent_ord_pay_method
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_PAYMENT_SCHEMA') | as_text }}.pay_parent_ord_pay_method"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_pay_parent_ord_pay_method_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.pay_parent_ord_pay_method_archive_v"
            load_type: incremental
      - name: pay_parent_transaction
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_PAYMENT_SCHEMA') | as_text }}.pay_parent_transaction"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_pay_parent_transaction_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.pay_parent_transaction_archive_v"
            load_type: incremental
      - name: pay_payment_tran_detail_group
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_PAYMENT_SCHEMA') | as_text }}.pay_payment_tran_detail_group"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_pay_payment_tran_detail_group_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.pay_payment_tran_detail_group_archive_v"
            load_type: incremental
      - name: pay_payment_response_status
        config:
          loaded_at_field: updated_timestamp
          meta:
            src_tbl: "{{ env_var('DBT_STAGE_DATABASE') | as_text }}.{{ env_var('DBT_DOM_STAGE_PAYMENT_SCHEMA') | as_text }}.pay_payment_response_status"
            tgt_tbl: "{{ env_var('DBT_SILVER_DATABASE') | as_text }}.{{ env_var('DBT_SILVER_SCHEMA') | as_text }}.mao_pay_payment_response_status_t"
            src_archive_tbl: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}.{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}.pay_payment_response_status_archive_v"
            load_type: incremental

