version: 2

sources:
  - name: nonpriority_ord_fulflmnt_bronze
    database: "{{ env_var('DBT_BRONZE_DATABASE') | as_text }}"
    schema: "{{ env_var('DBT_BRONZE_SCHEMA') | as_text }}"
    config:
      meta:
        pipeline_name: dom
        src_type: mysql
        src_name: mao
        src_module: mao
        tgt_layer: bronze
        mysql_connector_db: "{{ env_var('DBT_DOM_CONNECTOR_DB')| as_text }}.PUBLIC.connector_stats"
        t_minus_interval: "{{ env_var('DBT_T_MINUS_INTERVAL_BRONZE')| as_text }}"
    tables:
      - name: ful_quantity_detail
        config:
          loaded_at_field: seen_at
          meta:
            src_tbl: '{{ env_var("DBT_DOM_CONNECTOR_DB") | as_text }}.journals.FUL_QUANTITY_DETAIL'
            tgt_tbl: '{{ env_var("DBT_BRONZE_DATABASE") | as_text }}.{{ env_var("DBT_BRONZE_SCHEMA") | as_text }}.ful_quantity_detail_archive'
            load_type: incremental
      - name: ful_staging_location
        config:
          loaded_at_field: seen_at
          meta:
            src_tbl: '{{ env_var("DBT_DOM_CONNECTOR_DB") | as_text }}.journals.ful_staging_location'
            tgt_tbl: '{{ env_var("DBT_BRONZE_DATABASE") | as_text }}.{{ env_var("DBT_BRONZE_SCHEMA") | as_text }}.ful_staging_location_archive'
            load_type: incremental